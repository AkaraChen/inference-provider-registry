name: Update Models

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Update models
        working-directory: v1
        run: bun update-models.mjs

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add v1/providers/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            DATE=$(date +%Y-%m-%d)
            git commit -m "chore: update models $DATE"
            git push
            TAG="v$DATE"
            # If a tag for today already exists, append a counter
            COUNTER=1
            while git ls-remote --tags origin "$TAG" | grep -q "$TAG"; do
              TAG="v${DATE}-${COUNTER}"
              COUNTER=$((COUNTER + 1))
            done
            git tag "$TAG"
            git push origin "$TAG"
          fi
